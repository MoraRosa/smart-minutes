name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Compute BASE_PATH
        id: basepath
        run: |
          if [ -n "${{ vars.BASE_PATH }}" ]; then
            echo "value=${{ vars.BASE_PATH }}" >> $GITHUB_OUTPUT
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            if [ "$REPO_NAME" = "${{ github.repository_owner }}.github.io" ]; then
              echo "value=/" >> $GITHUB_OUTPUT
            else
              echo "value=/${REPO_NAME}/" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Build
        env:
          BASE_PATH: ${{ steps.basepath.outputs.value }}
        run: bun run build:pages
      - name: Fix SPA fallback
        run: cp dist-pages/pages/index.html dist-pages/index.html && cp dist-pages/index.html dist-pages/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
